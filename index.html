<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>🌲 Drönarbilder</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body {
margin: 0;
padding: 0;
font-family: sans-serif;
background: #e8f4f8;
}
#map {
width: 100vw;
height: 100vh;
}

/* Din anpassade layer panel */
.leaflet-control-layers {
box-shadow: 0 8px 25px rgba(0,0,0,0.3) !important;
border: 3px solid #4CAF50 !important;
border-radius: 15px !important;
width: 300px !important;
max-height: 450px !important;
font-size: 16px !important;
}
.leaflet-control-layers-toggle {
background: linear-gradient(145deg, #4CAF50, #45a049) !important;
border-radius: 12px 12px 0 0 !important;
font-weight: bold !important;
}
.leaflet-control-layers-list {
max-height: 380px !important;
}
</style>
</head>
<body>

<div id="map"></div>

<script>
// 1. Initiera kartan
const map = L.map('map').setView([60.78, 15.75], 14);

// 2. Skapa baslager (OSM) - FIXED: Full attribution added
const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
}).addTo(map);

// 3. Konfigurera Orto-lager (Här anger du unika koordinater för varje område!)
const ortoLayers = {
"📍 LE": {
layer: L.tileLayer('orto/VB/VB/{z}/{x}/{y}.jpg', { minZoom: 14, maxZoom: 23, opacity: 1, attribution: 'Drönarbilder' }),
center: [60.80, 15.72] // Rätt koordinat för BB
},
};

// 4. Bygg upp objektet för Leaflets layer control
const overlaysForControl = {};
for (const [name, data] of Object.entries(ortoLayers)) {
overlaysForControl[name] = data.layer;
}

// Lägg till layer control på kartan
L.control.layers(
{"🗺️ OSM": osm},
overlaysForControl,
{collapsed: false, position: 'topleft'}
).addTo(map);

// 5. Hantera zoom (flyTo) när ett lager bockas i
map.on('overlayadd', function(e) {
for (const [name, data] of Object.entries(ortoLayers)) {
if (data.layer === e.layer) {
// Använder flyTo istället för setView för en snyggare animation
map.flyTo(data.center, 15, { duration: 1.5 });
console.log(`Zoomar till: ${name} på koordinaterna ${data.center}`);
break;
}
}
});

// ==========================================
// 6. GPS / Användarens position
// ==========================================
let userMarker, accuracyCircle;

// Starta sökning efter GPS-position. 'watch: true' gör att den följer efter om du rör dig.
map.locate({setView: false, maxZoom: 16, watch: true, enableHighAccuracy: true});

// När positionen hittas
map.on('locationfound', function(e) {
const radius = Math.round(e.accuracy); // Noggrannhet i meter

if (!userMarker) {
// Skapa markör och cirkel första gången
userMarker = L.marker(e.latlng).addTo(map)
.bindPopup(`Du är här! (Noggrannhet: ~${radius}m)`);
accuracyCircle = L.circle(e.latlng, { radius: radius, color: '#2196F3', fillOpacity: 0.2 }).addTo(map);
} else {
// Uppdatera positionen om du rör på dig
userMarker.setLatLng(e.latlng);
accuracyCircle.setLatLng(e.latlng);
accuracyCircle.setRadius(radius);
}
});

// Om användaren nekar platsåtkomst eller GPS saknas
map.on('locationerror', function(e) {
console.warn("Kunde inte hämta GPS-position: ", e.message);
});

</script>
</body>
</html>
